name: Deploy React Subsite
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install and Build
        run: |
          cd case-study
          npm install
          npm run build
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: case-study/dist
          target-folder: case-study  # ← Match your vite base path
          token: ${{ secrets.GITHUB_TOKEN }}